<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CyberShield - Connexion</title>

    <link rel="stylesheet" href="login.css">

</head>
<header>
    <div class="container-header">
        <h1>CyberShield - Plateforme Anti-Cybercriminalité </h1>
         <nav>
            <a href="Acceuil.html"><i class="fas fa-paint-brush"></i>Acceuil</a>
            <a href="dépot.html"><i class="fas fa-paint-brush"></i>Dépot plainte</a>
            <a href="login.html"><i class="fas fa-paint-brush"></i>connexion enquêteur</a>
         </nav>

    </div>
</header>

<body>

    <div class="login-container">

        <div class="logo">

            <h1>CyberShield</h1>

            <p>
                Plateforme Anti-Cybercriminalité
            </p>

        </div>

        <form id="loginForm">

            <h2>
                Connexion Enquêteur
            </h2>

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="admin@cybershield.cg"
                    required>

            </div>

            <div class="input-group">

                <label>Mot de passe</label>

                <input
                    type="password"
                    id="password"
                    placeholder="********"
                    required>

            </div>
            <div class="cta-button">
                <a href="dashbord.html" class="cta-button">Se connecter </a>
            </div>
            <div id="message"></div>

        </form>

    </div>

    <script src="login.js"></script>

</body>

</html>
